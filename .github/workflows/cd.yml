name: CD

on:
  push:
    branches: [master, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          #TODO: how can i get the vrsion from the go.mod file?
          go-version: '1.26'

      - name: pwd
        run: /bin/bash pwd

      - name: ls
        run: /bin/bash ls
